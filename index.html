
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger365.pro Payment</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#1b2a49,#0b1020 50%,#050816);
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,.15);
}

.logo{
font-size:32px;
font-weight:700;
color:#00ffff;
text-shadow:0 0 15px #00ffff;
margin-bottom:10px;
}

.subtitle{
color:#ddd;
margin-bottom:20px;
font-size:14px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(0,255,255,.3);
background:rgba(255,255,255,.08);
color:#fff;
font-size:18px;
text-align:center;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:12px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.generate{
background:linear-gradient(135deg,#00ffff,#008cff);
color:white;
}

.pay{
background:linear-gradient(135deg,#ff00ff,#7a00ff);
color:white;
}

.copy{
background:linear-gradient(135deg,#ff9900,#ff5500);
color:white;
}

#qrcode{
margin-top:25px;
display:flex;
justify-content:center;
}

#qrcode img{
background:white;
padding:12px;
border-radius:18px;
}

.upi{
margin-top:15px;
color:#fff;
font-size:14px;
word-break:break-all;
}

.footer{
margin-top:15px;
font-size:12px;
color:#999;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">Tiger365.pro</div>

<div class="subtitle">
⚡ Instant UPI Payment Gateway ⚡
</div>

<input type="number" id="amount" placeholder="Enter Amount">

<button class="generate" onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

<div class="upi">
UPI ID: pooja71508-1@okaxis
</div>

<button class="copy" onclick="copyUPI()">
Copy UPI ID
</button>

<button class="pay" onclick="payNow()">
Pay Now
</button>

<div class="footer">
Secure UPI Payment
</div>

</div>

<script>

const upiId = "pooja71508-1@okaxis";
const payeeName = "Tiger365.pro";

let paymentLink = "";

function generateQR(){

let amount = document.getElementById("amount").value;

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

paymentLink =
`upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR`;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"),{
text:paymentLink,
width:250,
height:250
});
}

function payNow(){

if(paymentLink===""){
alert("Generate QR First");
return;
}

const a = document.createElement("a");
a.href = paymentLink;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

function copyUPI(){

navigator.clipboard.writeText(upiId);

alert("UPI ID Copied");
}

</script>

</body>
</html>
