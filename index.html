<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHARAT UPI Payment</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.generate{
    background:#28a745;
    color:white;
}

.pay{
    background:#007bff;
    color:white;
}

#qrcode{
    margin-top:20px;
    display:flex;
    justify-content:center;
}
</style>
</head>

<body>

<div class="container">

<h1>BHARAT PAYMENT</h1>

<input type="number" id="amount" placeholder="Enter Amount">

<button class="generate" onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

<button class="pay" onclick="payNow()">
Pay Now
</button>

</div>

<script>

const upiId = "pooja71508-1@okaxis";
const payeeName = "BHARAT";

let paymentLink = "";

function generateQR(){

    let amount = document.getElementById("amount").value;

    if(amount == "" || amount <= 0){
        alert("Enter valid amount");
        return;
    }

    paymentLink =
    `upi://pay?pa=${upiId}&pn=${payeeName}&am=${amount}&cu=INR`;

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"),{
        text: paymentLink,
        width:250,
        height:250
    });
}

function payNow(){

    if(paymentLink == ""){
        alert("Generate QR first");
        return;
    }

    window.location.href = paymentLink;
}

</script>

</body>
</html>
