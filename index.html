
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger365.pro UPI Payment</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:
    radial-gradient(circle at top,#16213e,#0a0f1f 40%,#050816 100%);
    overflow:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#00ffff;
    filter:blur(200px);
    opacity:.15;
    top:-150px;
    left:-150px;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#ff00ff;
    filter:blur(200px);
    opacity:.15;
    bottom:-150px;
    right:-150px;
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:
    0 0 20px rgba(0,255,255,.25),
    0 0 60px rgba(0,255,255,.08);
}

h1{
    color:#00ffff;
    font-size:32px;
    letter-spacing:3px;
    text-shadow:0 0 15px #00ffff;
}

.subtitle{
    color:white;
    margin-top:10px;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:18px;
    text-align:center;
    border:1px solid rgba(0,255,255,.3);
}

input::placeholder{
    color:#cfcfcf;
}

button{
    width:100%;
    border:none;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
    cursor:pointer;
    font-size:17px;
    font-weight:700;
    transition:.3s;
}

.generate{
    background:linear-gradient(135deg,#00ffff,#0088ff);
    color:white;
    box-shadow:0 0 20px rgba(0,255,255,.5);
}

.pay{
    background:linear-gradient(135deg,#ff00ff,#7b00ff);
    color:white;
    box-shadow:0 0 20px rgba(255,0,255,.5);
}

button:hover{
    transform:translateY(-2px);
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

#qrcode img{
    padding:12px;
    background:white;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,255,.7);
}

.footer{
    margin-top:20px;
    color:#aaa;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>BHARAT</h1>

<div class="subtitle">
⚡ Instant UPI Payment Gateway ⚡
</div>

<input type="number" id="amount" placeholder="Enter Amount">

<button class="generate" onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

<button class="pay" onclick="payNow()">
Pay Now
</button>

<div class="footer">
Secure UPI Payment
</div>

</div>

<script>

const upiId = "pooja71508-1@okaxis";
const payeeName = "BHARAT";

let paymentLink = "";

function generateQR(){

let amount = document.getElementById("amount").value;

if(amount == "" || amount <= 0){
alert("Enter Valid Amount");
return;
}

paymentLink =
`upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR`;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"),{
text: paymentLink,
width:250,
height:250
});

}

function payNow(){

if(paymentLink == ""){
alert("Generate QR First");
return;
}

window.location.href = paymentLink;

}

</script>

</body>
</html>
